# Matrix-element LHE generation for:
#   p p -> Z (b bbar)^3, with Z -> b bbar
#
# The Z decay is inside PROCESSES so the LHE contains eight final-state b
# partons. The first b and first bbar in the DecayOS flavour ordering are the
# Z-daughter pair and are left uncut. The remaining three b's and three bbar's
# receive the same 8b-style generation cuts.

EVENTS: 100
MPI_EVENT_MODE: 1
BATCH_MODE: 5
EVENT_DISPLAY_INTERVAL: 1000000
EVENT_GENERATION_MODE: PartiallyUnweighted
EVENT_OUTPUT: LHEF[pp_z_3bb_zbb_decayos_colorhack]
EVT_FILE_PATH: .
EVENT_OUTPUT_PRECISION: 12
COLOR_SCHEME: SAMPLE
RESULT_DIRECTORY: Results_PartiallyUnweighted

SP:
  SET_COLORS: true
  LHE_COLOR_FLOW_HACK: true
  LHE_COLOR_FLOW_DEBUG: false

LHEF_ASSIGN_MISSING_QQBAR_SINGLET: true
LHEF_ENFORCE_BEAM_ORDER: true

BEAMS: 2212
BEAM_ENERGIES: 7000
BEAM_SPECTRA: Monochromatic
PDF_LIBRARY: LHAPDFSherpa
PDF_SET: NNPDF23_nlo_as_0119
MPI_PDF_LIBRARY: LHAPDFSherpa
MPI_PDF_SET: NNPDF23_nlo_as_0119

SHOWER_GENERATOR: None
FRAGMENTATION: None
MI_HANDLER: None
BEAM_REMNANTS: false
ME_QED: {ENABLED: false}
YFS: {MODE: off}

ME_GENERATORS: Comix
SCALES: VAR{0.25*(H_T2+sqr(91.188))}{0.25*(H_T2+sqr(91.188))}

PSI:
  MAXOPT: 4
  STOPOPT: 4

PARTICLE_DATA:
  5:
    Massive: true
    Mass: 4.75

PROCESSES:
- 93 93 -> 23[a] 5 -5 5 -5 5 -5:
    Sort_Flavors: 1
    DecayOS:
    - 23[a] -> 5 -5
    Order: {QCD: 6, EW: 2}
    ME_Generator: Comix
    Integration_Error: 0.05

SELECTORS:
- VariableSelector:
    Variable: PT
    Flavs: [5]
    Ranges:
    - [0.0, E_CMS]
    - [15.0, E_CMS]
    - [15.0, E_CMS]
    - [15.0, E_CMS]
- VariableSelector:
    Variable: PT
    Flavs: [-5]
    Ranges:
    - [0.0, E_CMS]
    - [15.0, E_CMS]
    - [15.0, E_CMS]
    - [15.0, E_CMS]
- VariableSelector:
    Variable: Eta
    Flavs: [5]
    Ranges:
    - [-1000.0, 1000.0]
    - [-3.0, 3.0]
    - [-3.0, 3.0]
    - [-3.0, 3.0]
- VariableSelector:
    Variable: Eta
    Flavs: [-5]
    Ranges:
    - [-1000.0, 1000.0]
    - [-3.0, 3.0]
    - [-3.0, 3.0]
    - [-3.0, 3.0]
- VariableSelector:
    Variable: DR
    Flavs: [5, 5]
    Ranges:
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
- VariableSelector:
    Variable: DR
    Flavs: [-5, -5]
    Ranges:
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
- VariableSelector:
    Variable: DR
    Flavs: [5, -5]
    Ranges:
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.0, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.0, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.0, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
    - [0.3, E_CMS]
