# Matrix-element-only LHE generation for:
#   g g -> b bbar b bbar b bbar j j
#
# The light-jet alias 901 contains u, d, s, and g only; charm is excluded so
# explicit charm samples remain disjoint.

EVENTS: 200
MPI_EVENT_MODE: 1
BATCH_MODE: 5
EVENT_DISPLAY_INTERVAL: 100
EVENT_GENERATION_MODE: PartiallyUnweighted
EVENT_OUTPUT: LHEF[gg_3bbbar_2j]
EVT_FILE_PATH: .
EVENT_OUTPUT_PRECISION: 12
COLOR_SCHEME: SAMPLE
RESULT_DIRECTORY: Results_PartiallyUnweighted

SP:
  SET_COLORS: true
  LHE_COLOR_FLOW_HACK: true
  LHE_COLOR_FLOW_DEBUG: false

LHEF_ENFORCE_BEAM_ORDER: true

BEAMS: 2212
BEAM_ENERGIES: 7000
BEAM_SPECTRA: Monochromatic
PDF_LIBRARY: LHAPDFSherpa
PDF_SET: NNPDF23_nlo_as_0119
MPI_PDF_LIBRARY: LHAPDFSherpa
MPI_PDF_SET: NNPDF23_nlo_as_0119

SHOWER_GENERATOR: None
FRAGMENTATION: None
MI_HANDLER: None
BEAM_REMNANTS: false
ME_QED: {ENABLED: false}
YFS: {MODE: off}
HARD_DECAYS: {Enabled: false}

ME_GENERATORS: Comix
SCALES: VAR{0.25*H_T2}{0.25*H_T2}

PSI:
  MAXOPT: 4
  STOPOPT: 4

PARTICLE_CONTAINERS:
  901: {Name: lightjets, Flavs: [1, -1, 2, -2, 3, -3, 21]}

PARTICLE_DATA:
  5:
    Massive: true
    Mass: 4.75

PROCESSES:
- 21 21 -> 5 -5 5 -5 5 -5 901 901:
    Sort_Flavors: 1
    Order: {QCD: 8, EW: 0}
    ME_Generator: Comix
    Integration_Error: 0.05

SELECTORS:
- [PT, 5, 15.0, E_CMS]
- [PT, -5, 15.0, E_CMS]
- [PT, 901, 15.0, E_CMS]
- [Eta, 5, -3.0, 3.0]
- [Eta, -5, -3.0, 3.0]
- [Eta, 901, -3.0, 3.0]
- [DR, 5, 5, 0.3, E_CMS]
- [DR, -5, -5, 0.3, E_CMS]
- [DR, 5, -5, 0.3, E_CMS]
- [DR, 901, 901, 0.3, E_CMS]
- [DR, 5, 901, 0.3, E_CMS]
- [DR, -5, 901, 0.3, E_CMS]
