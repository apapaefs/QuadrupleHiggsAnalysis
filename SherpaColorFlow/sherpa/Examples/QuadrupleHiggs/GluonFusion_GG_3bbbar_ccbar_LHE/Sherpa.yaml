# Matrix-element-only LHE generation for:
#   g g -> b bbar b bbar b bbar c cbar
#
# Colour-flow-safe card for the patched Sherpa LHE writer.

EVENTS: 200
EVENT_GENERATION_MODE: PartiallyUnweighted
EVENT_OUTPUT: LHEF[gg_3bbbar_ccbar]
EVT_FILE_PATH: .
EVENT_OUTPUT_PRECISION: 12
COLOR_SCHEME: SAMPLE
RESULT_DIRECTORY: Results_PartiallyUnweighted

SP:
  SET_COLORS: true
  LHE_COLOR_FLOW_HACK: true
  LHE_COLOR_FLOW_DEBUG: false

LHEF_ENFORCE_BEAM_ORDER: true

BEAMS: 2212
BEAM_ENERGIES: 7000
BEAM_SPECTRA: Monochromatic
PDF_LIBRARY: LHAPDFSherpa
PDF_SET: NNPDF23_nlo_as_0119
MPI_PDF_LIBRARY: LHAPDFSherpa
MPI_PDF_SET: NNPDF23_nlo_as_0119

SHOWER_GENERATOR: None
FRAGMENTATION: None
MI_HANDLER: None
BEAM_REMNANTS: false
ME_QED: {ENABLED: false}
YFS: {MODE: off}
HARD_DECAYS: {Enabled: false}

ME_GENERATORS: Comix
SCALES: VAR{0.25*H_T2}{0.25*H_T2}

PSI:
  MAXOPT: 4
  STOPOPT: 4

PARTICLE_DATA:
  4:
    Massive: true
    Mass: 1.5
  5:
    Massive: true
    Mass: 4.75

PROCESSES:
- 21 21 -> 5 -5 5 -5 5 -5 4 -4:
    Sort_Flavors: 1
    Order: {QCD: 8, EW: 0}
    ME_Generator: Comix
    Integration_Error: 0.05

SELECTORS:
- [PT, 5, 15.0, E_CMS]
- [PT, -5, 15.0, E_CMS]
- [PT, 4, 15.0, E_CMS]
- [PT, -4, 15.0, E_CMS]
- [Eta, 5, -3.0, 3.0]
- [Eta, -5, -3.0, 3.0]
- [Eta, 4, -3.0, 3.0]
- [Eta, -4, -3.0, 3.0]
- [DR, 5, 5, 0.3, E_CMS]
- [DR, -5, -5, 0.3, E_CMS]
- [DR, 5, -5, 0.3, E_CMS]
- [DR, 4, -4, 0.3, E_CMS]
- [DR, 5, 4, 0.3, E_CMS]
- [DR, 5, -4, 0.3, E_CMS]
- [DR, -5, 4, 0.3, E_CMS]
- [DR, -5, -4, 0.3, E_CMS]
