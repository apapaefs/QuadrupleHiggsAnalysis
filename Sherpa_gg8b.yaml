# Matrix-element-only LHE generation for:
#   g g -> b bbar b bbar b bbar b bbar
#
# This is the colour-flow-safe version of the original tiresias 8b card.

EVENTS: 200
EVENT_GENERATION_MODE: PartiallyUnweighted
EVENT_OUTPUT: LHEF[gg_4bbbar]
EVT_FILE_PATH: .
EVENT_OUTPUT_PRECISION: 12
COLOR_SCHEME: SAMPLE
RESULT_DIRECTORY: Results_PartiallyUnweighted

SP:
  SET_COLORS: true
  LHE_COLOR_FLOW_HACK: true
  LHE_COLOR_FLOW_DEBUG: false

LHEF_ENFORCE_BEAM_ORDER: true

BEAMS: 2212
BEAM_ENERGIES: 7000
BEAM_SPECTRA: Monochromatic
PDF_LIBRARY: LHAPDFSherpa
PDF_SET: NNPDF23_nlo_as_0119
MPI_PDF_LIBRARY: LHAPDFSherpa
MPI_PDF_SET: NNPDF23_nlo_as_0119

SHOWER_GENERATOR: None
FRAGMENTATION: None
MI_HANDLER: None
BEAM_REMNANTS: false
ME_QED: {ENABLED: false}
YFS: {MODE: off}
HARD_DECAYS: {Enabled: false}

ME_GENERATORS: Comix
SCALES: VAR{0.25*H_T2}{0.25*H_T2}

PSI:
  MAXOPT: 4
  STOPOPT: 4

PARTICLE_DATA:
  5:
    Massive: true
    Mass: 4.75

PROCESSES:
- 21 21 -> 5 -5 5 -5 5 -5 5 -5:
    Sort_Flavors: 1
    Order: {QCD: 8, EW: 0}
    ME_Generator: Comix
    Integration_Error: 0.05

SELECTORS:
- [PT, 5, 15.0, E_CMS]
- [PT, -5, 15.0, E_CMS]
- [Eta, 5, -3.0, 3.0]
- [Eta, -5, -3.0, 3.0]
- [DR, 5, 5, 0.3, E_CMS]
- [DR, -5, -5, 0.3, E_CMS]
- [DR, 5, -5, 0.3, E_CMS]
